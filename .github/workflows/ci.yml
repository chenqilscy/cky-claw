name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: pre-commit/action@v3.0.1

  lint-python:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lint Framework
        working-directory: kasaya
        run: |
          uv sync --extra dev
          uv run ruff check .
          uv run ruff format --check .

      - name: Lint Backend
        working-directory: backend
        run: |
          uv sync --extra dev
          uv run ruff check .
          uv run ruff format --check .

      - name: Type Check Framework
        working-directory: kasaya
        run: |
          uv run mypy kasaya/ --ignore-missing-imports

      - name: Type Check Backend
        working-directory: backend
        run: |
          uv run mypy app/ --ignore-missing-imports

  lint-frontend:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: ESLint
        working-directory: frontend
        run: pnpm lint

      - name: TypeScript Type Check
        working-directory: frontend
        run: npx tsc --noEmit

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: lint-python
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: kasaya_test
          POSTGRES_USER: kasaya
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kasaya"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Test Framework
        working-directory: kasaya
        run: |
          uv sync --extra dev
          uv run pytest tests/ --ignore=tests/test_integration.py --ignore=tests/test_e2e_integration.py --ignore=tests/test_e2e_phase69.py --ignore=tests/test_mcp_integration.py -q --tb=short

      - name: Test Backend
        working-directory: backend
        env:
          KASAYA_DATABASE_URL: postgresql+asyncpg://kasaya:test@localhost:5432/kasaya_test
        run: |
          uv sync --extra dev
          uv run pytest tests/ --ignore=tests/test_performance.py -q --tb=short

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: lint-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install & Test
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm test -- --run

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-python, test-frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build Frontend
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Build Docker Images
        run: |
          docker compose build backend frontend
