# Kasaya Helm Chart — 默认配置
# 通过 Kustomize overlay 或 --set 覆盖

# ── 全局 ──
global:
  # 镜像仓库前缀（如私有 Harbor: harbor.example.com/kasaya）
  imageRegistry: ""
  # 全局镜像拉取密钥
  imagePullSecrets: []

# ── Backend ──
backend:
  replicaCount: 2
  image:
    repository: kasaya/backend
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  # 健康检查
  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
  startupProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 15
    periodSeconds: 5
    failureThreshold: 12
  # HPA 配置
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  # PDB 配置
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  # 环境变量（非敏感）
  env:
    KASAYA_DEBUG: "false"
    KASAYA_OTEL_ENABLED: "false"
    KASAYA_OTEL_SERVICE_NAME: "kasaya-backend"
  # 数据库迁移 Job（Helm install/upgrade 时执行）
  migration:
    enabled: true

# ── Frontend ──
frontend:
  replicaCount: 2
  image:
    repository: kasaya/frontend
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

# ── PostgreSQL（内置，生产建议用外部托管）──
postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
  auth:
    database: kasaya
    username: kasaya
    # 通过 Secret 注入，此处仅为默认值
    password: ""
    existingSecret: ""
    secretKeys:
      password: postgresql-password
  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
  # pgvector 扩展（RAG 知识库需要）
  initSQL: |
    CREATE EXTENSION IF NOT EXISTS vector;

# ── Redis（内置，生产建议用外部托管）──
redis:
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
  auth:
    password: ""
    existingSecret: ""
    secretKeys:
      password: redis-password
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ── 外部数据库（postgresql.enabled=false 时使用）──
externalDatabase:
  host: ""
  port: 5432
  database: kasaya
  username: kasaya
  password: ""
  existingSecret: ""
  secretKeys:
    password: postgresql-password

# ── 外部 Redis（redis.enabled=false 时使用）──
externalRedis:
  host: ""
  port: 6379
  password: ""
  existingSecret: ""
  secretKeys:
    password: redis-password

# ── Ingress ──
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    # SSE 流式输出需要关闭缓冲
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
  hosts:
    - host: kasaya.example.com
      paths:
        - path: /api
          pathType: Prefix
          service: backend
        - path: /health
          pathType: Exact
          service: backend
        - path: /
          pathType: Prefix
          service: frontend
  tls: []
  #  - secretName: kasaya-tls
  #    hosts:
  #      - kasaya.example.com

# ── Secret ──
secret:
  # JWT 密钥（必须修改）
  jwtSecretKey: ""
  # 也可引用已有 Secret
  existingSecret: ""
  secretKeys:
    jwtSecretKey: jwt-secret-key

# ── 通用 ──
nodeSelector: {}
tolerations: []
affinity: {}
