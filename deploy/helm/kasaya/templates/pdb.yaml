{{- if .Values.backend.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "kasaya.fullname" . }}-backend
  labels:
    {{- include "kasaya.labels" . | nindent 4 }}
    {{- include "kasaya.backend.selectorLabels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.backend.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "kasaya.backend.selectorLabels" . | nindent 6 }}
{{- end }}
---
{{- if .Values.frontend.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "kasaya.fullname" . }}-frontend
  labels:
    {{- include "kasaya.labels" . | nindent 4 }}
    {{- include "kasaya.frontend.selectorLabels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.frontend.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "kasaya.frontend.selectorLabels" . | nindent 6 }}
{{- end }}
