# CkyClaw Kustomize — 生产环境
# 用法: helm install ckyclaw ./deploy/helm/ckyclaw -f deploy/helm/ckyclaw/overlays/prod.yaml
#
# ⚠️ 生产环境注意事项:
# 1. 必须使用外部托管的 PostgreSQL 和 Redis（关闭内置实例）
# 2. 必须配置 TLS 证书
# 3. 必须将 Secret 通过 existingSecret 引入（不要在 values 中明文写密码）
# 4. 建议配置 Pod Anti-Affinity 使副本分布在不同节点

backend:
  replicaCount: 3
  image:
    pullPolicy: Always
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 65
    targetMemoryUtilizationPercentage: 75
  podDisruptionBudget:
    enabled: true
    minAvailable: 2
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
  env:
    CKYCLAW_DEBUG: "false"
    CKYCLAW_OTEL_ENABLED: "true"
    CKYCLAW_OTEL_SERVICE_NAME: "ckyclaw-backend"

frontend:
  replicaCount: 2
  image:
    pullPolicy: Always
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  resources:
    requests:
      cpu: 200m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi

# 生产环境关闭内置数据库，使用外部托管
postgresql:
  enabled: false

redis:
  enabled: false

# 外部 PostgreSQL（RDS / CloudSQL / 自建主从）
externalDatabase:
  host: "your-rds-endpoint.amazonaws.com"
  port: 5432
  database: ckyclaw
  username: ckyclaw
  existingSecret: "ckyclaw-db-secret"
  secretKeys:
    password: postgresql-password

# 外部 Redis（ElastiCache / Memorystore / 自建哨兵）
externalRedis:
  host: "your-redis-endpoint.cache.amazonaws.com"
  port: 6379
  existingSecret: "ckyclaw-redis-secret"
  secretKeys:
    password: redis-password

# Secret 通过 existingSecret 引用
secret:
  existingSecret: "ckyclaw-app-secret"
  secretKeys:
    jwtSecretKey: jwt-secret-key

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: ckyclaw.example.com
      paths:
        - path: /api
          pathType: Prefix
          service: backend
        - path: /health
          pathType: Exact
          service: backend
        - path: /
          pathType: Prefix
          service: frontend
  tls:
    - secretName: ckyclaw-tls
      hosts:
        - ckyclaw.example.com

# Pod Anti-Affinity（分散到不同节点）
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/part-of
                operator: In
                values:
                  - ckyclaw
          topologyKey: kubernetes.io/hostname
