{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "ckyclaw.fullname" . }}-redis
  labels:
    {{- include "ckyclaw.labels" . | nindent 4 }}
    {{- include "ckyclaw.redis.selectorLabels" . | nindent 4 }}
spec:
  serviceName: {{ include "ckyclaw.fullname" . }}-redis
  replicas: 1
  selector:
    matchLabels:
      {{- include "ckyclaw.redis.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ckyclaw.redis.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          ports:
            - name: tcp-redis
              containerPort: 6379
              protocol: TCP
          command:
            - redis-server
            - --requirepass
            - $(REDIS_PASSWORD)
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ckyclaw.redis.secretName" . }}
                  key: {{ .Values.redis.auth.secretKeys.password }}
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.redis.persistence.storageClass }}
        storageClassName: {{ .Values.redis.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.redis.persistence.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ckyclaw.fullname" . }}-redis
  labels:
    {{- include "ckyclaw.labels" . | nindent 4 }}
    {{- include "ckyclaw.redis.selectorLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: tcp-redis
      protocol: TCP
      name: tcp-redis
  selector:
    {{- include "ckyclaw.redis.selectorLabels" . | nindent 4 }}
{{- end }}
