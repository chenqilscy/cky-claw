server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # 通过 Docker API 采集 ckyclaw-backend 容器日志
  - job_name: docker-logs
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
        filters:
          - name: name
            values: ["ckyclaw-backend"]
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container
      - target_label: job
        replacement: backend
      - target_label: service
        replacement: ckyclaw-backend
    pipeline_stages:
      - docker: {}
      - json:
          expressions:
            level: level
            logger: logger
            message: message
          drop_malformed: true
      - labels:
          level:
          logger:
