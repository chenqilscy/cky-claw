apiVersion: 1

datasources:
  # Loki — 日志聚合
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    jsonData:
      maxLines: 5000
      derivedFields:
        # 从日志中提取 request_id，链接到 Jaeger Trace
        - datasourceUid: jaeger
          matcherRegex: '"request_id":"([^"]+)"'
          name: TraceID
          url: '${__value.raw}'

  # Jaeger — 链路追踪（已存在，供 derived fields 引用）
  - name: Jaeger
    uid: jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686

  # Prometheus — 指标（已存在）
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
