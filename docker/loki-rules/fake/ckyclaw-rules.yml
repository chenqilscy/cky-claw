groups:
  - name: ckyclaw-backend-alerts
    interval: 1m
    rules:
      - alert: CkyclawBackendHighErrorRate
        expr: |
          sum by (job) (count_over_time({job="backend",level="ERROR"}[5m])) > 20
        for: 5m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "CkyClaw backend error logs are high"
          description: "Error logs in backend exceeded 20 events in 5 minutes."

      - alert: CkyclawBackendHasFatal
        expr: |
          sum by (job) (count_over_time({job="backend"} |= "Traceback" [10m])) > 0
        for: 1m
        labels:
          severity: critical
          service: backend
        annotations:
          summary: "CkyClaw backend has traceback logs"
          description: "Detected traceback in backend logs in the last 10 minutes."
