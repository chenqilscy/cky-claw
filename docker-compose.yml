# Kasaya Docker Compose — 开发环境
# 使用: docker-compose up -d
# 注意: db 和 redis 已注释，使用外部 fn.cky 环境

services:
  # === 基础设施（已注释，使用外部 fn.cky 环境）===
  # db:
  #   image: postgres:16-alpine
  #   container_name: kasaya-db
  #   restart: unless-stopped
  #   ports:
  #     - "5432:5432"
  #   environment:
  #     POSTGRES_DB: kasaya
  #     POSTGRES_USER: kasaya
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kasaya_dev}
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U kasaya"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 5

  # redis:
  #   image: redis:7-alpine
  #   container_name: kasaya-redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redisdata:/data
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 5

  # === 应用服务 ===
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: kasaya-backend
    restart: unless-stopped
    networks:
      - default
      - 1panel-network
    ports:
      - "8080:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      KASAYA_DATABASE_URL: postgresql+asyncpg://admin:Admin888@host.docker.internal:15432/kasaya
      KASAYA_REDIS_URL: redis://:Admin888@host.docker.internal:16379/0
      KASAYA_SECRET_KEY: ${KASAYA_SECRET_KEY:-dev-secret-key-change-in-production}
      KASAYA_DEBUG: ${KASAYA_DEBUG:-true}
      KASAYA_OTEL_ENABLED: ${KASAYA_OTEL_ENABLED:-false}
      KASAYA_OTEL_EXPORTER_ENDPOINT: http://jaeger:4317
      KASAYA_JAEGER_UI_URL: ${KASAYA_JAEGER_UI_URL:-}
      KASAYA_PROMETHEUS_UI_URL: ${KASAYA_PROMETHEUS_UI_URL:-}
    # depends_on 已移除（使用外部 DB/Redis）
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kasaya-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

  # === 可观测性（按需启用）===
  # Jaeger: 独立部署，profile=jaeger
  # - 如果宿主机已有 Jaeger（如 fn.cky），可跳过，只用 --profile otel
  # - 如果需要全新部署：docker compose --profile otel --profile jaeger up -d
  jaeger:
    image: jaegertracing/all-in-one:1.58
    container_name: kasaya-jaeger
    restart: unless-stopped
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"     # Jaeger UI
      - "${JAEGER_OTLP_GRPC_PORT:-4317}:4317"  # OTLP gRPC
      - "${JAEGER_OTLP_HTTP_PORT:-4318}:4318"  # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - default
      - 1panel-network
    profiles:
      - jaeger

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: kasaya-prometheus
    restart: unless-stopped
    ports:
      - "19090:9090"
    networks:
      - default
      - 1panel-network
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    profiles:
      - otel

  # === 日志聚合（docker compose --profile loki up -d）===
  loki:
    image: grafana/loki:3.0.0
    container_name: kasaya-loki
    restart: unless-stopped
    user: "0:0"
    ports:
      - "3100:3100"
    networks:
      - default
      - 1panel-network
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ./docker/loki-config.yml:/etc/loki/config.yml:ro
      - ./docker/loki-rules:/etc/loki/rules:ro
      - lokidata:/tmp/loki
    profiles:
      - loki

  promtail:
    image: grafana/promtail:3.0.0
    container_name: kasaya-promtail
    restart: unless-stopped
    networks:
      - default
      - 1panel-network
    volumes:
      - ./docker/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /vol2/docker/containers:/vol2/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    profiles:
      - loki

  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: kasaya-alertmanager
    restart: unless-stopped
    ports:
      - "19093:9093"
    networks:
      - default
      - 1panel-network
    volumes:
      - ./docker/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    profiles:
      - loki

  grafana:
    image: grafana/grafana:11.0.0
    container_name: kasaya-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    networks:
      - default
      - 1panel-network
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-Admin888}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_FEATURE_TOGGLES_ENABLE: "lokiExploreLogsPanel"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./docker/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./docker/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./docker/grafana-dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - loki
      - alertmanager
    profiles:
      - loki

  # === 定时备份（按需启用：docker-compose --profile backup up -d）===
  backup:
    image: postgres:16-alpine
    container_name: kasaya-backup
    restart: unless-stopped
    volumes:
      - ./scripts/backup.sh:/scripts/backup.sh:ro
      - backupdata:/var/backups/kasaya
    environment:
      PGHOST: host.docker.internal
      PGPORT: "15432"
      PGUSER: admin
      PGPASSWORD: Admin888
      PGDATABASE: kasaya
      REDIS_HOST: host.docker.internal
      REDIS_PORT: "16379"
      BACKUP_DIR: /var/backups/kasaya
      PG_RETAIN_DAYS: "30"
      REDIS_RETAIN_DAYS: "7"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache redis bash
        echo "0 2 * * * /bin/bash /scripts/backup.sh >> /var/log/backup.log 2>&1" | crontab -
        crond -f -l 2
    # depends_on 已移除（使用外部 DB/Redis）
    profiles:
      - backup

volumes:
  # pgdata:     # 已注释（使用外部 PostgreSQL）
  # redisdata:  # 已注释（使用外部 Redis）
  promdata:
  backupdata:
  lokidata:
  grafanadata:

networks:
  1panel-network:
    external: true
