# CkyClaw Docker Compose — 开发环境
# 使用: docker-compose up -d

services:
  # === 基础设施 ===
  db:
    image: postgres:16-alpine
    container_name: ckyclaw-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ckyclaw
      POSTGRES_USER: ckyclaw
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ckyclaw_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ckyclaw"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ckyclaw-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # === 应用服务 ===
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ckyclaw-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      CKYCLAW_DATABASE_URL: postgresql+asyncpg://ckyclaw:${POSTGRES_PASSWORD:-ckyclaw_dev}@db:5432/ckyclaw
      CKYCLAW_REDIS_URL: redis://redis:6379/0
      CKYCLAW_SECRET_KEY: ${CKYCLAW_SECRET_KEY:-dev-secret-key-change-in-production}
      CKYCLAW_DEBUG: ${CKYCLAW_DEBUG:-true}
      CKYCLAW_OTEL_ENABLED: ${CKYCLAW_OTEL_ENABLED:-false}
      CKYCLAW_OTEL_EXPORTER_ENDPOINT: ${CKYCLAW_OTEL_EXPORTER_ENDPOINT:-http://jaeger:4317}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ckyclaw-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

  # === 可观测性（按需启用：CKYCLAW_OTEL_ENABLED=true）===
  jaeger:
    image: jaegertracing/all-in-one:1.58
    container_name: ckyclaw-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    profiles:
      - otel

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: ckyclaw-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    profiles:
      - otel

  # === 定时备份（按需启用：docker-compose --profile backup up -d）===
  backup:
    image: postgres:16-alpine
    container_name: ckyclaw-backup
    restart: unless-stopped
    volumes:
      - ./scripts/backup.sh:/scripts/backup.sh:ro
      - backupdata:/var/backups/ckyclaw
      - redisdata:/redis-data:ro
    environment:
      PGHOST: db
      PGPORT: "5432"
      PGUSER: ckyclaw
      PGPASSWORD: ${POSTGRES_PASSWORD:-ckyclaw_dev}
      PGDATABASE: ckyclaw
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      BACKUP_DIR: /var/backups/ckyclaw
      PG_RETAIN_DAYS: "30"
      REDIS_RETAIN_DAYS: "7"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache redis bash
        echo "0 2 * * * /bin/bash /scripts/backup.sh >> /var/log/backup.log 2>&1" | crontab -
        crond -f -l 2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - backup

volumes:
  pgdata:
  redisdata:
  promdata:
  backupdata:
