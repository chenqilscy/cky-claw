# CkyClaw Docker Compose — 开发环境
# 使用: docker-compose up -d

services:
  # === 基础设施 ===
  db:
    image: postgres:16-alpine
    container_name: ckyclaw-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ckyclaw
      POSTGRES_USER: ckyclaw
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ckyclaw_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ckyclaw"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ckyclaw-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # === 应用服务 ===
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ckyclaw-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      CKYCLAW_DATABASE_URL: postgresql+asyncpg://ckyclaw:${POSTGRES_PASSWORD:-ckyclaw_dev}@db:5432/ckyclaw
      CKYCLAW_REDIS_URL: redis://redis:6379/0
      CKYCLAW_SECRET_KEY: ${CKYCLAW_SECRET_KEY:-dev-secret-key-change-in-production}
      CKYCLAW_DEBUG: ${CKYCLAW_DEBUG:-true}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ckyclaw-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
