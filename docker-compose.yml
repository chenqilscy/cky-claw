# CkyClaw Docker Compose — 开发环境
# 使用: docker-compose up -d
# 注意: db 和 redis 已注释，使用外部 fn.cky 环境

services:
  # === 基础设施（已注释，使用外部 fn.cky 环境）===
  # db:
  #   image: postgres:16-alpine
  #   container_name: ckyclaw-db
  #   restart: unless-stopped
  #   ports:
  #     - "5432:5432"
  #   environment:
  #     POSTGRES_DB: ckyclaw
  #     POSTGRES_USER: ckyclaw
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ckyclaw_dev}
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ckyclaw"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 5

  # redis:
  #   image: redis:7-alpine
  #   container_name: ckyclaw-redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redisdata:/data
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 5

  # === 应用服务 ===
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ckyclaw-backend
    restart: unless-stopped
    networks:
      - default
      - 1panel-network
    ports:
      - "8080:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      CKYCLAW_DATABASE_URL: postgresql+asyncpg://admin:Admin888@host.docker.internal:15432/ckyclaw
      CKYCLAW_REDIS_URL: redis://:Admin888@host.docker.internal:16379/0
      CKYCLAW_SECRET_KEY: ${CKYCLAW_SECRET_KEY:-dev-secret-key-change-in-production}
      CKYCLAW_DEBUG: ${CKYCLAW_DEBUG:-true}
      CKYCLAW_OTEL_ENABLED: ${CKYCLAW_OTEL_ENABLED:-false}
      CKYCLAW_OTEL_EXPORTER_ENDPOINT: http://jaeger:4317
      CKYCLAW_JAEGER_UI_URL: ${CKYCLAW_JAEGER_UI_URL:-}
      CKYCLAW_PROMETHEUS_UI_URL: ${CKYCLAW_PROMETHEUS_UI_URL:-}
    # depends_on 已移除（使用外部 DB/Redis）
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ckyclaw-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

  # === 可观测性（按需启用）===
  # Jaeger: 独立部署，profile=jaeger
  # - 如果宿主机已有 Jaeger（如 fn.cky），可跳过，只用 --profile otel
  # - 如果需要全新部署：docker compose --profile otel --profile jaeger up -d
  jaeger:
    image: jaegertracing/all-in-one:1.58
    container_name: ckyclaw-jaeger
    restart: unless-stopped
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"     # Jaeger UI
      - "${JAEGER_OTLP_GRPC_PORT:-4317}:4317"  # OTLP gRPC
      - "${JAEGER_OTLP_HTTP_PORT:-4318}:4318"  # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - default
      - 1panel-network
    profiles:
      - jaeger

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: ckyclaw-prometheus
    restart: unless-stopped
    ports:
      - "19090:9090"
    networks:
      - default
      - 1panel-network
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    profiles:
      - otel

  # === 定时备份（按需启用：docker-compose --profile backup up -d）===
  backup:
    image: postgres:16-alpine
    container_name: ckyclaw-backup
    restart: unless-stopped
    volumes:
      - ./scripts/backup.sh:/scripts/backup.sh:ro
      - backupdata:/var/backups/ckyclaw
    environment:
      PGHOST: host.docker.internal
      PGPORT: "15432"
      PGUSER: admin
      PGPASSWORD: Admin888
      PGDATABASE: ckyclaw
      REDIS_HOST: host.docker.internal
      REDIS_PORT: "16379"
      BACKUP_DIR: /var/backups/ckyclaw
      PG_RETAIN_DAYS: "30"
      REDIS_RETAIN_DAYS: "7"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache redis bash
        echo "0 2 * * * /bin/bash /scripts/backup.sh >> /var/log/backup.log 2>&1" | crontab -
        crond -f -l 2
    # depends_on 已移除（使用外部 DB/Redis）
    profiles:
      - backup

volumes:
  # pgdata:     # 已注释（使用外部 PostgreSQL）
  # redisdata:  # 已注释（使用外部 Redis）
  promdata:
  backupdata:

networks:
  1panel-network:
    external: true
